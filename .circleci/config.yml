version: 2.1

orbs:
  architect: giantswarm/architect@9.5.5

jobs:
  debug-tag:
    docker:
      - image: cimg/base:2026.07
    steps:
      - checkout
      - run: |
          echo "running for tag ${CIRCLE_TAG}"

  update-krew-index:
    docker:
      - image: cimg/go:1.26.5

    environment:
      KREW_RELEASE_BOT_VERSION: v0.0.38
      GITHUB_ACTIONS: "true"
      GITHUB_REPOSITORY: giantswarm/kubectl-gs
      GITHUB_ACTOR: architectbot

    steps:
      - checkout
      - run:
          name: Configure krew-release-bot
          command: |
            echo "using krew-release-bot version ${KREW_RELEASE_BOT_VERSION}"
            curl -LO https://github.com/rajatjindal/krew-release-bot/releases/download/${KREW_RELEASE_BOT_VERSION}/krew-release-bot_${KREW_RELEASE_BOT_VERSION}_linux_amd64.tar.gz
            tar -xvf krew-release-bot_${KREW_RELEASE_BOT_VERSION}_linux_amd64.tar.gz
            echo export GITHUB_REF=refs/tags/${CIRCLE_TAG} >> "$BASH_ENV"
            echo export GITHUB_WORKSPACE=$(pwd) >> "$BASH_ENV"
      - run:
          name: Execute krew-release-bot
          command: ./krew-release-bot action

workflows:
  go-build-multiarch:
    jobs:
      - architect/go-build:
          context: architect
          name: go-build
          binary: kubectl-gs
          architectures: "linux/amd64,linux/arm64,darwin/amd64,darwin/arm64,windows/amd64,windows/arm64"
          filters:
            tags:
              only: /^v.*/

      - architect/push-to-registries:
          context: architect
          name: push-to-registries
          platforms: "linux/amd64,linux/arm64"
          force-public: true
          split-china-push: true
          requires:
            - go-build
          filters:
            branches:
              ignore:
                - main
            tags:
              only: /^v.*/

      - architect/sync-china-registry:
          context: architect
          name: sync-china-registry
          requires:
            - push-to-registries
          filters:
            branches:
              ignore: /.*/
            tags:
              only: /^v.*/

      - architect/upload-release-assets:
          context: architect
          name: upload-release-assets
          binary: kubectl-gs
          requires:
            - go-build
          post-steps:
            - run:
                name: Package binaries as krew archives and upload
                command: |
                  set -euo pipefail

                  tag="${CIRCLE_TAG:?CIRCLE_TAG must be set}"
                  shopt -s nullglob

                  archives=()
                  for binary in kubectl-gs-*-*; do
                    case "$binary" in
                      *.bundle | *.tar.gz) continue ;;
                    esac

                    platform="${binary#kubectl-gs-}"
                    os="${platform%%-*}"
                    arch="${platform#*-}"; arch="${arch%.exe}"

                    if [[ "$os" == "windows" ]]; then
                      inner="kubectl-gs.exe"
                    else
                      inner="kubectl-gs"
                    fi

                    cp "$binary" "$inner"
                    chmod +x "$inner"
                    archive="kubectl-gs-${tag}-${os}-${arch}.tar.gz"
                    tar -czf "$archive" "$inner" LICENSE
                    rm -f "$inner"
                    archives+=( "$archive" )
                  done

                  if [[ ${#archives[@]} -eq 0 ]]; then
                    echo "No binaries found to package." >&2
                    ls -la
                    exit 1
                  fi

                  echo "Uploading ${#archives[@]} krew archive(s):"
                  printf '  %s\n' "${archives[@]}"
                  gh release upload "$tag" "${archives[@]}" --clobber \
                    --repo "${CIRCLE_PROJECT_USERNAME}/${CIRCLE_PROJECT_REPONAME}"
          filters:
            tags:
              only: /^v.*/
            branches:
              ignore: /.*/

      - debug-tag:
          filters:
            branches:
              ignore: /.*/
            tags:
              only: /v[0-9]+(\.[0-9]+)*(-.*)*/

      - update-krew-index:
          requires:
            - upload-release-assets
            - debug-tag
          filters:
            branches:
              ignore: /.*/
            tags:
              only: /v[0-9]+(\.[0-9]+)*(-.*)*/
