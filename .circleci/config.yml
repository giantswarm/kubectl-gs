version: 2.1

orbs:
  architect: giantswarm/architect@9.4.2

jobs:
  debug-tag:
    docker:
      - image: cimg/base:2026.06
    steps:
      - checkout
      - run: |
          echo "running for tag ${CIRCLE_TAG}"

  update-krew-index:
    docker:
      - image: cimg/go:1.26.4

    environment:
      KREW_RELEASE_BOT_VERSION: v0.0.38
      GITHUB_ACTIONS: "true"
      GITHUB_REPOSITORY: giantswarm/kubectl-gs
      GITHUB_ACTOR: architectbot

    steps:
      - checkout
      - run:
          name: Configure krew-release-bot
          command: |
            echo "using krew-release-bot version ${KREW_RELEASE_BOT_VERSION}"
            curl -LO https://github.com/rajatjindal/krew-release-bot/releases/download/${KREW_RELEASE_BOT_VERSION}/krew-release-bot_${KREW_RELEASE_BOT_VERSION}_linux_amd64.tar.gz
            tar -xvf krew-release-bot_${KREW_RELEASE_BOT_VERSION}_linux_amd64.tar.gz
            echo export GITHUB_REF=refs/tags/${CIRCLE_TAG} >> "$BASH_ENV"
            echo export GITHUB_WORKSPACE=$(pwd) >> "$BASH_ENV"
      - run:
          name: Execute krew-release-bot
          command: ./krew-release-bot action

workflows:
  go-build-multiarch:
    jobs:
      - architect/go-build:
          context: architect
          name: go-build
          binary: kubectl-gs
          architectures: "linux/amd64,linux/arm64,darwin/amd64,darwin/arm64,windows/amd64,windows/arm64"
          filters:
            tags:
              only: /^v.*/

      - architect/push-to-registries:
          context: architect
          name: push-to-registries
          platforms: "linux/amd64,linux/arm64"
          force-public: true
          split-china-push: true
          requires:
            - go-build
          filters:
            branches:
              ignore:
                - main
            tags:
              only: /^v.*/

      - architect/sync-china-registry:
          context: architect
          name: sync-china-registry
          requires:
            - push-to-registries
          filters:
            branches:
              ignore: /.*/
            tags:
              only: /^v.*/

      - architect/upload-release-assets:
          context: architect
          name: upload-release-assets
          binary: kubectl-gs
          requires:
            - go-build
          filters:
            tags:
              only: /^v.*/
            branches:
              ignore: /.*/

      - debug-tag:
          filters:
            branches:
              ignore: /.*/
            tags:
              only: /v[0-9]+(\.[0-9]+)*(-.*)*/

      - update-krew-index:
          requires:
            - upload-release-assets
            - debug-tag
          filters:
            branches:
              ignore: /.*/
            tags:
              only: /v[0-9]+(\.[0-9]+)*(-.*)*/
